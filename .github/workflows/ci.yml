name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install llmgateway
        run: python -m pip install "seemseam-llmgateway>=0.1.2"

      - name: Install Hippos
        run: python -m pip install -e ".[dev,repomap]"

      - name: Compile sources
        run: python -m compileall src/hippos src/hippocampus

      - name: Smoke CLI
        run: hippos --help

      - name: Run focused tests
        run: |
          pytest -q tests/test_architec_metrics.py
          pytest -q tests/test_cli_core_commands.py
          pytest -q tests/test_cli_integration.py -k "main_help or onekey_help or update_help"
          pytest -q tests/test_config.py
          pytest -q tests/test_user_llm_config.py
          pytest -q tests/test_install_script.py
